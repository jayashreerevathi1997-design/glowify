{% extends 'base.html' %}
{% load static %}

{% block title %}Sign Up – Glowify{% endblock %}

{% block content %}

<section style="padding: 50px 0 70px; background: #fff; min-height: 80vh;">
    <div class="container">
        <!-- Heading outside the card -->
        <h2 style="font-family:var(--font-display); font-size:1.8rem; font-weight:700; color:#222; margin-bottom:30px; text-align:center;">
            Register Now !
        </h2>

        <div class="row align-items-center justify-content-center g-0">

            <!-- Left: Illustration -->
            <div class="col-md-5 d-none d-md-flex justify-content-center align-items-center">
                <img src="{% static 'images/login-illustration.png' %}"
                     alt="Signup Illustration"
                     style="max-width:380px; width:100%; height:auto;">
            </div>

            <!-- Right: Signup Form -->
            <div class="col-md-5">
                <div style="max-width:420px; margin:0 auto;">
                    <div style="background:#fff; border:1px solid #f0f0f0; border-radius:16px; padding:32px; box-shadow:0 4px 20px rgba(0,0,0,0.07);">
                        <h5 style="font-weight:700; font-size:1.1rem; color:#222; text-align:center; margin-bottom:22px;">
                            Create Account
                        </h5>

                        <form id="signupForm" novalidate onsubmit="return validateSignupForm(event)">
                            {% csrf_token %}

                            <!-- Full Name -->
                            <div style="margin-bottom:16px;">
                                <label style="font-size:0.82rem; font-weight:600; color:#555; display:block; margin-bottom:6px;">Full Name</label>
                                <input type="text" id="signupName" placeholder="e.g Narmatha"
                                       style="width:100%; border:1px solid #e0e0e0; border-radius:8px; padding:11px 14px; font-size:0.88rem; outline:none; transition:border 0.2s;"
                                       onfocus="this.style.borderColor='#e91e8c'" onblur="this.style.borderColor='#e0e0e0'">
                                <span id="signupNameError" style="color:#e91e8c; font-size:0.75rem; display:none; margin-top:4px;"></span>
                            </div>

                            <!-- Email -->
                            <div style="margin-bottom:16px;">
                                <label style="font-size:0.82rem; font-weight:600; color:#555; display:block; margin-bottom:6px;">Email id</label>
                                <input type="email" id="signupEmail" placeholder="nar@gmail.com"
                                       style="width:100%; border:1px solid #e0e0e0; border-radius:8px; padding:11px 14px; font-size:0.88rem; outline:none; transition:border 0.2s;"
                                       onfocus="this.style.borderColor='#e91e8c'" onblur="this.style.borderColor='#e0e0e0'">
                                <span id="signupEmailError" style="color:#e91e8c; font-size:0.75rem; display:none; margin-top:4px;"></span>
                            </div>

                            <!-- Password -->
                            <div style="margin-bottom:16px; position:relative;">
                                <label style="font-size:0.82rem; font-weight:600; color:#555; display:block; margin-bottom:6px;">Password</label>
                                <div style="position:relative;">
                                    <input type="password" id="signupPassword" placeholder="Enter Password"
                                           style="width:100%; border:1px solid #e0e0e0; border-radius:8px; padding:11px 40px 11px 14px; font-size:0.88rem; outline:none; transition:border 0.2s;"
                                           onfocus="this.style.borderColor='#e91e8c'" onblur="this.style.borderColor='#e0e0e0'">
                                    <button type="button" onclick="toggleSignupPassword()"
                                            style="position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:#aaa; padding:0;">
                                        <i class="bi bi-eye-slash" id="signupEyeIcon"></i>
                                    </button>
                                </div>
                                <span id="signupPasswordError" style="color:#e91e8c; font-size:0.75rem; display:none; margin-top:4px;"></span>
                            </div>

                            <!-- Remember Me -->
                            <div style="display:flex; align-items:center; gap:8px; margin-bottom:20px;">
                                <input type="checkbox" id="rememberSignup" checked
                                       style="accent-color:#e91e8c; width:16px; height:16px;">
                                <label for="rememberSignup" style="font-size:0.85rem; color:#555; cursor:pointer;">Remember me</label>
                            </div>

                            <!-- Register Button -->
                            <button type="submit"
                                    style="width:100%; background:#e91e8c; color:white; border:none; border-radius:8px; padding:13px; font-weight:700; font-size:1rem; cursor:pointer; margin-bottom:16px;">
                                Register
                            </button>

                            <!-- Login Link -->
                            <p style="text-align:center; font-size:0.83rem; color:#888; margin-bottom:8px;">
                                Already have an account?
                                <a href="{% url 'login' %}" style="color:#e91e8c; font-weight:600; text-decoration:none;">Login</a>
                            </p>

                            <!-- Instant Signup -->
                            <p style="text-align:center; font-size:0.82rem; color:#555; margin-bottom:18px;">
                                Instant Signup
                            </p>

                            <!-- Social Login -->
                            <div style="display:flex; gap:10px;">
                                <button type="button"
                                        style="flex:1; display:flex; align-items:center; justify-content:center; gap:8px; border:1px solid #e0e0e0; border-radius:8px; padding:10px; background:#fff; font-size:0.82rem; font-weight:600; color:#444; cursor:pointer;">
                                    <img src="https://www.google.com/favicon.ico" alt="Google" style="width:16px; height:16px;">
                                    Continue With google
                                </button>
                                <button type="button"
                                        style="flex:1; display:flex; align-items:center; justify-content:center; gap:8px; border:1px solid #e0e0e0; border-radius:8px; padding:10px; background:#fff; font-size:0.82rem; font-weight:600; color:#444; cursor:pointer;">
                                    <i class="bi bi-facebook" style="color:#1877f2; font-size:1rem;"></i>
                                    Continue With facebook
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

        </div>
    </div>
</section>

{% endblock %}

{% block extra_js %}
<script>
function toggleSignupPassword() {
    const input = document.getElementById('signupPassword');
    const icon = document.getElementById('signupEyeIcon');
    if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'bi bi-eye';
    } else {
        input.type = 'password';
        icon.className = 'bi bi-eye-slash';
    }
}

function showError(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.style.display = 'block';
}

function clearError(id) {
    const el = document.getElementById(id);
    el.textContent = '';
    el.style.display = 'none';
}

function validateSignupForm(e) {
    e.preventDefault();
    let valid = true;
    const name = document.getElementById('signupName').value.trim();
    const email = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value;
    const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    clearError('signupNameError');
    clearError('signupEmailError');
    clearError('signupPasswordError');

    // Name validation
    if (!name) {
        showError('signupNameError', 'Full name is required');
        valid = false;
    } else if (name.length < 2) {
        showError('signupNameError', 'Name must be at least 2 characters');
        valid = false;
    }

    // Email validation
    if (!email) {
        showError('signupEmailError', 'Email is required');
        valid = false;
    } else if (!emailPattern.test(email)) {
        showError('signupEmailError', 'Please enter a valid email address');
        valid = false;
    }

    // Password validation
    if (!password) {
        showError('signupPasswordError', 'Password is required');
        valid = false;
    } else if (password.length < 6) {
        showError('signupPasswordError', 'Password must be at least 6 characters');
        valid = false;
    } else if (!/[A-Z]/.test(password)) {
        showError('signupPasswordError', 'Password must contain at least one uppercase letter');
        valid = false;
    } else if (!/[0-9]/.test(password)) {
        showError('signupPasswordError', 'Password must contain at least one number');
        valid = false;
    }

    if (valid) {
        window.location.href = '/';
    }

    return false;
}
</script>
{% endblock %}
